version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_PATH: /data/todos.db
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - todo-data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  todo-data:
    name: todo-data
